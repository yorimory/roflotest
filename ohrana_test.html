        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--background); color: var(--text); line-height: 1.6; margin: 0; padding: 0; padding-top: 80px; }

        .subtitle { text-align: center; color: #8d99ae; margin-bottom: 40px; }
        
        .question-container { background: var(--surface); padding: 30px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .question-text { font-size: 1.15em; font-weight: 600; margin-bottom: 20px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-label { display: flex; align-items: center; padding: 15px; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .option-label:hover { background: #f8fbff; }
        .option-label input[type="radio"] { display: none; }
        .custom-radio { width: 22px; height: 22px; border: 2px solid #adb5bd; border-radius: 6px; margin-right: 15px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .option-label input[type="radio"]:checked + .custom-radio { background: var(--primary); border-color: var(--primary); }
        .option-label input[type="radio"]:checked + .custom-radio::after { content: '✓'; color: white; font-weight: bold; }
        
        .option-label.correct { border-color: var(--success) !important; background: #e8f8f5 !important; color: #1e8449 !important; }
        .option-label.correct .custom-radio { background: var(--success); border-color: var(--success); }
        .option-label.incorrect { border-color: var(--danger) !important; background: #fdedec !important; color: #c0392b !important; }
        .option-label.incorrect .custom-radio { background: var(--danger); border-color: var(--danger); }

        .submit-btn { background: var(--primary); color: white; border: none; padding: 15px 30px; font-size: 1.2em; border-radius: 30px; cursor: pointer; width: 100%; margin-bottom: 40px; display: none; transition: background 0.3s; }

    ];

const quizContainer = document.getElementById('quiz-container');
let score = 0;

quizData.forEach((item, index) => {
    const qDiv = document.createElement('div');
    qDiv.className = 'question-container';
    qDiv.dataset.answered = 'false';
    qDiv.dataset.correct = item.a;
    
    let optionsHtml = '';
    item.o.forEach((opt, idx) => {
        optionsHtml += `
            <label class="option-label">
                <input type="radio" name="q${index}" value="${idx}" onchange="checkAnswer(this, this.parentElement.parentElement.parentElement)">
                <div class="custom-radio"></div>
                <span class="option-text">${opt}</span>
            </label>
        `;
    });
    
    qDiv.innerHTML = `<div class="question-text">${item.q}</div><div class="options">${optionsHtml}</div>`;
    quizContainer.appendChild(qDiv);
});

function checkAnswer(radio, qDiv) {
    if (qDiv.dataset.answered === 'true') return;
    qDiv.dataset.answered = 'true';
    
    const correctAns = parseInt(qDiv.dataset.correct);
    const selectedVal = parseInt(radio.value);
    
    qDiv.querySelectorAll('input').forEach(i => { i.disabled = true; i.parentElement.style.pointerEvents = 'none'; });
    
    if (selectedVal === correctAns) {
        score++;
        radio.parentElement.classList.add('correct');
    } else {
        radio.parentElement.classList.add('incorrect');
        qDiv.querySelector(`input[value="${correctAns}"]`).parentElement.classList.add('correct');
    }
    
    const answered = document.querySelectorAll('.question-container[data-answered="true"]').length;
    document.getElementById('progressBar').style.width = (answered / quizData.length * 100) + '%';
    
    if (answered === quizData.length) {
        document.getElementById('scoreVal').innerText = score + ' из ' + quizData.length;
        document.getElementById('result-card').style.display = 'block';
    }
}
</script>
