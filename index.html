<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МЕГА-ТЕСТ: Основы алгоритмизации и программирования</title>
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #2ecc71;
            --danger: #e74c3c;
            --background: #f8f9fa;
            --surface: #ffffff;
            --text: #2b2d42;
            --text-light: #8d99ae;
            --border: #e9ecef;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--background);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            color: var(--primary);
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 1.2em;
        }

        .section-card {
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 40px;
            overflow: hidden;
        }

        .section-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 20px 30px;
            font-size: 1.5em;
            font-weight: 600;
        }

        .question-container {
            padding: 30px;
            border-bottom: 1px solid var(--border);
            transition: background 0.3s;
        }

        .question-container:last-child {
            border-bottom: none;
        }

        .question-text {
            font-size: 1.15em;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border: 2px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .option-label:hover {
            border-color: #b0c4de;
            background: #f8fbff;
        }

        .option-label input[type="radio"] {
            display: none;
        }

        /* Custom Checkbox/Radio styling */
        .custom-radio {
            width: 22px;
            height: 22px;
            border: 2px solid #adb5bd;
            border-radius: 6px; /* slightly square to look like a modern checkbox */
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .option-label input[type="radio"]:checked + .custom-radio {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .option-label input[type="radio"]:checked + .custom-radio::after {
            content: '✓';
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .option-label input[type="radio"]:checked ~ .option-text {
            font-weight: 600;
            color: var(--primary);
        }

        .option-label.selected {
            border-color: var(--primary);
            background: #f0f4ff;
        }

        /* Results styling */
        .option-label.correct {
            border-color: var(--success) !important;
            background: #e8f8f5 !important;
            color: #1e8449 !important;
        }
        .option-label.correct .custom-radio {
            background-color: var(--success);
            border-color: var(--success);
        }
        .option-label.incorrect {
            border-color: var(--danger) !important;
            background: #fdedec !important;
            color: #c0392b !important;
        }
        .option-label.incorrect .custom-radio {
            background-color: var(--danger);
            border-color: var(--danger);
            content: '✕';
        }

        .submit-btn {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.4em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 50px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(46, 204, 113, 0.4);
        }

        #result-card {
            display: none;
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 40px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .score {
            font-size: 4em;
            font-weight: 800;
            color: var(--primary);
            margin: 20px 0;
        }

        .progress-bar-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: #eee;
            z-index: 1000;
        }

        .progress-bar {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

<div class="progress-bar-container">
    <div class="progress-bar" id="progressBar"></div>
</div>

<div class="container">
    <header>
        <h1>Интерактивный МЕГА-ТЕСТ</h1>
        <div class="subtitle">Основы алгоритмизации и программирования на C++ (112 вопросов)</div>
    </header>

    <div id="result-card">
        <h2>Ваш результат:</h2>
        <div class="score"><span id="scoreVal">0</span> / 112</div>
        <p id="scoreMsg" style="font-size: 1.2em; color: var(--text-light);"></p>
        <button class="submit-btn" style="margin-top:20px; padding: 15px;" onclick="window.scrollTo({top:0, behavior:'smooth'})">Посмотреть ошибки</button>
    </div>

    <form id="quizForm">
        <div id="quiz-container"></div>
        <button type="button" class="submit-btn" onclick="checkAnswers()">Завершить тест и узнать результат</button>
    </form>
</div>

<script>
    // Массив с данными вопросов
    const quizData = [
        { section: "РАЗДЕЛ I. ТЕОРИЯ АЛГОРИТМОВ И БЛОК-СХЕМЫ" },
        { q: "1. Что такое алгоритм?", o: ["(а) Набор микросхем компьютера", "(б) Строгая последовательность действий, приводящая к решению задачи за конечное число шагов", "(в) Программа-транслятор", "(г) Устройство для хранения информации", "(д) Формальная система математических уравнений"], a: 1 },
        { q: "2. Какое свойство алгоритма означает, что вычислительный процесс должен быть разбит на последовательность отдельных, неделимых шагов?", o: ["(а) Массовость", "(б) Детерминированность", "(в) Дискретность", "(г) Результативность", "(д) Понятность"], a: 2 },
        { q: "3. Какое свойство алгоритма предполагает, что он применим для решения целого класса однотипных задач?", o: ["(а) Массовость", "(б) Однозначность", "(в) Дискретность", "(г) Конечность", "(д) Оптимальность"], a: 0 },
        { q: "4. Свойство детерминированности (точности) алгоритма означает, что:", o: ["(а) Алгоритм всегда завершается", "(б) Каждое правило алгоритма четкое, однозначное и не оставляет места для произвола", "(в) Алгоритм разбивается на шаги", "(г) Алгоритм решает множество задач", "(д) Алгоритм написан на С++"], a: 1 },
        { q: "5. Свойство конечности (результативности) алгоритма гарантирует, что:", o: ["(а) Алгоритм будет работать вечно", "(б) Алгоритм всегда выдаст правильный ответ", "(в) Алгоритм завершит работу после выполнения конечного числа шагов", "(г) Алгоритм будет использовать минимум памяти", "(д) Программа скомпилируется без ошибок"], a: 2 },
        { q: "6. Какой способ описания алгоритмов является наиболее наглядным и стандартизированным?", o: ["(а) Словесный (на естественном языке)", "(б) Графический (блок-схемы)", "(в) Псевдокод", "(г) Стихотворный", "(д) Математические формулы"], a: 1 },
        { q: "7. Как в блок-схемах по ГОСТ 19.701-90 обозначаются начало и конец алгоритма?", o: ["(а) Прямоугольник", "(б) Ромб", "(в) Овал (эллипс)", "(г) Шестиугольник", "(д) Треугольник"], a: 2 },
        { q: "8. Какая фигура в блок-схемах используется для обозначения блоков ввода и вывода данных?", o: ["(а) Прямоугольник", "(б) Ромб", "(в) Овал", "(г) Параллелограмм", "(д) Трапеция"], a: 3 },
        { q: "9. Каким символом в блок-схеме обозначается вычислительный процесс (выполнение операций, присваивание)?", o: ["(а) Прямоугольник", "(б) Ромб", "(в) Параллелограмм", "(г) Круг", "(д) Овал"], a: 0 },
        { q: "10. Какая геометрическая фигура в схемах алгоритмов обозначает логическое условие (ветвление)?", o: ["(а) Овал", "(б) Прямоугольник с двойными краями", "(в) Ромб", "(г) Шестиугольник", "(д) Пятиугольник"], a: 2 },
        { q: "11. Блок в форме вытянутого шестиугольника в ГОСТ-схемах обычно используется для обозначения:", o: ["(а) Начала программы", "(б) Вывода на печать", "(в) Модификации (заголовка цикла с параметром)", "(г) Вызова подпрограммы", "(д) Ручного ввода"], a: 2 },
        { q: "12. Как называется алгоритм, в котором все команды выполняются строго последовательно, одна за другой?", o: ["(а) Циклический", "(б) Разветвляющийся", "(в) Рекурсивный", "(г) Линейный", "(д) Стохастический"], a: 3 },
        { q: "13. Какой алгоритм содержит блок проверки условия, в зависимости от которого выбирается один из двух возможных путей выполнения?", o: ["(а) Линейный", "(б) Разветвляющийся", "(в) Итерационный", "(г) Циклический", "(д) Последовательный"], a: 1 },
        { q: "14. Алгоритм, в котором определенная последовательность действий выполняется многократно, называется:", o: ["(а) Линейным", "(б) Разветвляющимся", "(в) Циклическим", "(г) Древовидным", "(д) Эвристическим"], a: 2 },
        { q: "15. Если проверка условия продолжения цикла происходит *до* выполнения тела цикла, это:", o: ["(а) Цикл с постусловием", "(б) Цикл с параметром", "(в) Цикл с предусловием", "(г) Бесконечный цикл", "(д) Рекурсия"], a: 2 },
        { q: "16. Какой цикл обязательно выполнится хотя бы один раз?", o: ["(а) Цикл с предусловием", "(б) Цикл с постусловием", "(в) Цикл for", "(г) Цикл while", "(д) Пустой цикл"], a: 1 },
        { q: "17. В чем суть метода нисходящего проектирования («сверху-вниз»)?", o: ["(а) Разработка от частных модулей к общей структуре", "(б) Разбиение сложной исходной задачи на более мелкие подзадачи", "(в) Использование только циклов", "(г) Отказ от подпрограмм", "(д) Сначала пишется интерфейс"], a: 1 },
        { q: "18. Восходящее проектирование («снизу-вверх») характеризуется тем, что:", o: ["(а) Сначала разрабатываются и тестируются базовые модули, которые затем объединяются в более крупные", "(б) Задача разбивается сверху вниз", "(в) Программа пишется с конца файла к началу", "(г) Алгоритм вообще не используется", "(д) Программа рисуется только блок-схемами"], a: 0 },
        { q: "19. Как называется алгоритмическая конструкция, в которой при невыполнении условия не предусмотрено никаких действий (одна ветвь пустая)?", o: ["(а) Полное ветвление", "(б) Сокращенное (неполное) ветвление", "(в) Многовариантный выбор", "(г) Цикл", "(д) Безусловный переход"], a: 1 },
        { q: "20. Процесс пошагового выполнения алгоритма с фиксацией промежуточных значений переменных для поиска ошибок называется:", o: ["(а) Компиляция", "(б) Компоновка", "(в) Трансляция", "(г) Трассировка", "(д) Проектирование"], a: 3 },
        
        { section: "РАЗДЕЛ II. АРИФМЕТИЧЕСКИЕ ОСНОВЫ ЭВМ И СИСТЕМЫ СЧИСЛЕНИЯ" },
        { q: "21. Какая система счисления называется позиционной?", o: ["(а) Значение цифры не зависит от её позиции", "(б) Значение цифры зависит от её позиции в числе", "(в) Используются только буквы", "(г) Нет нуля", "(д) Римская система"], a: 1 },
        { q: "22. Какое основание имеет двоичная система счисления?", o: ["(а) 1", "(б) 2", "(в) 8", "(г) 10", "(д) 16"], a: 1 },
        { q: "23. Какие символы используются в шестнадцатеричной системе счисления?", o: ["(а) 0-9", "(б) 0-7", "(в) 0-1", "(г) 0-9 и A-F", "(д) A-Z"], a: 3 },
        { q: "24. Чему равно двоичное число 1010 в десятичной системе?", o: ["(а) 8", "(б) 9", "(в) 10", "(г) 12", "(д) 14"], a: 2 },
        { q: "25. Как записывается десятичное число 15 в двоичной системе?", o: ["(а) 1000", "(б) 1010", "(в) 1100", "(г) 1111", "(д) 10000"], a: 3 },
        { q: "26. Чему равно двоичное число 10000000 в десятичной системе?", o: ["(а) 64", "(б) 128", "(в) 255", "(г) 256", "(д) 512"], a: 1 },
        { q: "27. Какому десятичному числу соответствует шестнадцатеричная цифра A?", o: ["(а) 10", "(б) 11", "(в) 12", "(г) 14", "(д) 15"], a: 0 },
        { q: "28. Какому двоичному числу соответствует шестнадцатеричная цифра F?", o: ["(а) 1010", "(б) 1100", "(в) 1110", "(г) 1111", "(д) 10000"], a: 3 },
        { q: "29. Выполните сложение в двоичной системе: 10 + 11 = ?", o: ["(а) 100", "(б) 101", "(в) 110", "(г) 111", "(д) 21"], a: 1 },
        { q: "30. При выполнении операции логического сдвига целого двоичного числа ВЛЕВО на 1 разряд число:", o: ["(а) Умножается на 2", "(б) Делится на 2", "(в) Умножается на 10", "(г) Меняет знак", "(д) Не изменяется"], a: 0 },
        { q: "31. При выполнении логического сдвига целого двоичного числа ВПРАВО на 1 разряд число:", o: ["(а) Умножается на 2", "(б) Делится на 2 (целочисленно)", "(в) Возводится в квадрат", "(г) Теряет старший бит", "(д) Инвертируется"], a: 1 },
        { q: "32. Какой код используется в ЭВМ для представления целых отрицательных чисел и выполнения операции вычитания как сложения?", o: ["(а) Прямой код", "(б) Обратный код", "(в) Дополнительный код", "(г) Код Грея", "(д) Символьный код"], a: 2 },
        { q: "33. Формат представления чисел с плавающей точкой в ЭВМ состоит из:", o: ["(а) Целой и дробной части фиксированной длины", "(б) Мантиссы и порядка", "(в) Делимого и делителя", "(г) Действительной и мнимой части", "(д) Кодировки ASCII"], a: 1 },
        { q: "34. Для каких задач в основном используется формат с фиксированной точкой?", o: ["(а) Астрономических вычислений", "(б) Представления сверхбольших чисел", "(в) Целочисленной арифметики и финансовых расчетов", "(г) Кодирования видео", "(д) Работы со строками"], a: 2 },
        { q: "35. Язык программирования, в котором команды представлены в виде двоичных или шестнадцатеричных кодов, понятных процессору без перевода, называется:", o: ["(а) Язык высокого уровня", "(б) Язык ассемблера", "(в) Машинный язык", "(г) Псевдокод", "(д) SQL"], a: 2 },
        { q: "36. Язык программирования низкого уровня, в котором машинные команды заменены символьными обозначениями (мнемониками), называется:", o: ["(а) Python", "(б) C++", "(в) Java", "(г) Язык ассемблера", "(д) HTML"], a: 3 },
        { q: "37. Программа, которая переводит весь исходный код программы на языке высокого уровня в машинный код, называется:", o: ["(а) Интерпретатор", "(б) Компилятор", "(в) Редактор", "(г) Отладчик", "(д) Трассировщик"], a: 1 },

        { q: "39. Какая программа объединяет несколько скомпилированных объектных файлов и библиотеки для создания исполняемого файла (.exe)?", o: ["(а) Редактор", "(б) Препроцессор", "(в) Компилятор", "(г) Компоновщик (Linker)", "(д) Дебаггер"], a: 3 },
        { q: "40. Правильная последовательность этапов превращения кода на C++ в работающую программу:", o: ["(а) Написание -> Компоновка -> Компиляция -> Выполнение", "(б) Написание -> Компиляция -> Компоновка -> Выполнение", "(в) Написание -> Выполнение -> Компиляция -> Компоновка", "(г) Компиляция -> Написание -> Выполнение -> Отладка", "(д) Написание -> Интерпретация -> Компоновка -> Выполнение"], a: 1 },
        
        { section: "РАЗДЕЛ III. ПРОГРАММНОЕ ОБЕСПЕЧЕНИЕ И ЭТАПЫ РАЗРАБОТКИ" },
        { q: "41. Какой этап жизненного цикла программного обеспечения обычно является первым?", o: ["(а) Написание кода", "(б) Постановка задачи и анализ требований", "(в) Тестирование", "(г) Внедрение", "(д) Создание инсталлятора"], a: 1 },
        { q: "42. На каком этапе разработки алгоритм переводится на конкретный язык программирования?", o: ["(а) Постановка задачи", "(б) Проектирование", "(в) Кодирование (реализация)", "(г) Тестирование", "(д) Анализ"], a: 2 },
        { q: "43. Процесс проверки программы на наличие логических и синтаксических ошибок называется:", o: ["(а) Трансляция", "(б) Инкапсуляция", "(в) Рефакторинг", "(г) Тестирование", "(д) Документирование"], a: 3 },
        { q: "44. Устранение найденных при тестировании ошибок в коде называется:", o: ["(а) Отладка (Debugging)", "(б) Компиляция", "(в) Сборка", "(г) Оптимизация", "(д) Инсталляция"], a: 0 },
        { q: "45. Внесение изменений в программу после её передачи пользователям (исправление багов, добавление функций) относится к этапу:", o: ["(а) Проектирование", "(б) Тестирование", "(в) Сопровождение (Maintenance)", "(г) Релиз", "(д) Постановка задачи"], a: 2 },

    const quizContainer = document.getElementById('quiz-container');
    const progressBar = document.getElementById('progressBar');
    
    let totalQuestions = 0;
    let questionIndex = 0;

    // Генерируем HTML
    quizData.forEach((item) => {
        if (item.section) {
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'section-card';
            sectionDiv.innerHTML = `<div class="section-header">${item.section}</div><div class="section-content"></div>`;
            quizContainer.appendChild(sectionDiv);
        } else {
            totalQuestions++;
            const currentSection = quizContainer.lastElementChild.querySelector('.section-content');
            
            const qDiv = document.createElement('div');
            qDiv.className = 'question-container';
            qDiv.id = `question-${totalQuestions}`;
            
            let optionsHtml = '';
            item.o.forEach((opt, idx) => {
                optionsHtml += `
                    <label class="option-label" onclick="selectOption(this, 'q${totalQuestions}')">
                        <input type="radio" name="q${totalQuestions}" value="${idx}">
                        <div class="custom-radio"></div>
                        <span class="option-text">${opt}</span>
                    </label>
                `;
            });

            qDiv.innerHTML = `
                <div class="question-text">${item.q}</div>
                <div class="options">${optionsHtml}</div>
            `;
            
            currentSection.appendChild(qDiv);
            
            // Сохраняем правильный ответ в DOM для быстрой проверки
            qDiv.dataset.correct = item.a;
        }
    });

    // Обработка выбора ответа (для стилизации)
    function selectOption(label, groupName) {
        // Убираем класс selected у всех радиобатонов в этой группе
        const labels = label.parentElement.querySelectorAll('.option-label');
        labels.forEach(l => l.classList.remove('selected'));
        // Добавляем класс выбранному
        label.classList.add('selected');

        updateProgress();
    }

    function updateProgress() {
        const answered = document.querySelectorAll('input[type="radio"]:checked').length;
        const percentage = (answered / totalQuestions) * 100;
        progressBar.style.width = percentage + '%';
    }

    function checkAnswers() {
        let score = 0;
        let answered = 0;

        for (let i = 1; i <= totalQuestions; i++) {
            const qDiv = document.getElementById(`question-${i}`);
            const correctAns = parseInt(qDiv.dataset.correct);
            const selectedRadio = document.querySelector(`input[name="q${i}"]:checked`);
            
            // Сбрасываем старые стили
            const labels = qDiv.querySelectorAll('.option-label');
            labels.forEach(l => {
                l.classList.remove('correct', 'incorrect');
                // Отключаем клики после проверки
                l.querySelector('input').disabled = true;
                l.style.pointerEvents = 'none';
            });

            if (selectedRadio) {
                answered++;
                const selectedVal = parseInt(selectedRadio.value);
                const selectedLabel = selectedRadio.parentElement;
                
                if (selectedVal === correctAns) {
                    score++;
                    selectedLabel.classList.add('correct');
                } else {
                    selectedLabel.classList.add('incorrect');
                    // Подсвечиваем правильный
                    const correctLabel = qDiv.querySelector(`input[value="${correctAns}"]`).parentElement;
                    correctLabel.classList.add('correct');
                }
            } else {
                // Если не ответили
                const correctLabel = qDiv.querySelector(`input[value="${correctAns}"]`).parentElement;
                correctLabel.classList.add('correct');
            }
        }

        // Показываем результат
        const resultCard = document.getElementById('result-card');
        document.getElementById('scoreVal').innerText = score;
        
        const scoreMsg = document.getElementById('scoreMsg');
        const percentage = score / totalQuestions;
        if (percentage === 1) scoreMsg.innerText = "Идеально! Вы гуру программирования! 🏆";
        else if (percentage >= 0.8) scoreMsg.innerText = "Отличный результат! Вы отлично знаете материал! 🌟";
        else if (percentage >= 0.5) scoreMsg.innerText = "Неплохо, но есть что повторить. 📚";
        else scoreMsg.innerText = "Вам определенно стоит уделить больше времени учебе. 💻";

        resultCard.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
