        answered = true;

        const q = quizData[currentQuestionIndex];
        const buttons = optionsGrid.querySelectorAll('.option-btn');

        if (selectedIndex === q.a) {
            btn.classList.add('correct');
            correctAnswers++;
            correctCountSpan.innerText = correctAnswers;
        } else {
            btn.classList.add('wrong');
            buttons[q.a].classList.add('correct');
            wrongAnswers++;
            wrongCountSpan.innerText = wrongAnswers;
        }

        buttons.forEach(b => b.style.pointerEvents = 'none');
        nextBtn.classList.add('visible');
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            loadQuestion();
        } else {
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.add('active');
            document.getElementById('finalScore').innerText = `${correctAnswers} из ${quizData.length}`;
        }
    }

    // Инициализация
    loadQuestion();
</script>
</body>
</html>
