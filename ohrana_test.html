        { q: "300. Что представляют собой абиотические факторы среды обитания?", o: ["Факторы неживой природы (свет, влажность, давление)", "Факторы живой природы (влияние растений и животных)", "Влияние космических лучей на организм", "Факторы, вызванные деятельностью человека (заводы, вырубка лесов)"], a: 0 },

    ];

    let currentQuestionIndex = 0;
    let correctAnswers = 0;
    let wrongAnswers = 0;
    let answered = false;

    const questionText = document.getElementById('questionText');
    const optionsGrid = document.getElementById('optionsGrid');
    const questionCounter = document.getElementById('questionCounter');
    const correctCountSpan = document.getElementById('correctCount');
    const wrongCountSpan = document.getElementById('wrongCount');
    const nextBtn = document.getElementById('nextBtn');
    const progressFill = document.getElementById('progressFill');

    function loadQuestion() {
        answered = false;
        nextBtn.classList.remove('visible');
        
        const q = quizData[currentQuestionIndex];
        questionCounter.innerText = `Вопрос ${currentQuestionIndex + 1} из ${quizData.length}`;
        questionText.innerText = q.q;
        
        progressFill.style.width = `${(currentQuestionIndex / quizData.length) * 100}%`;

        optionsGrid.innerHTML = '';
        q.o.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => selectOption(index, btn);
            optionsGrid.appendChild(btn);
        });
    }

    function selectOption(selectedIndex, btn) {
        if (answered) return;
        answered = true;

        const q = quizData[currentQuestionIndex];
        const buttons = optionsGrid.querySelectorAll('.option-btn');

        if (selectedIndex === q.a) {
            btn.classList.add('correct');
            correctAnswers++;
            correctCountSpan.innerText = correctAnswers;
        } else {
            btn.classList.add('wrong');
            buttons[q.a].classList.add('correct');
            wrongAnswers++;
            wrongCountSpan.innerText = wrongAnswers;
        }

        buttons.forEach(b => b.style.pointerEvents = 'none');
        nextBtn.classList.add('visible');
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            loadQuestion();
        } else {
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.add('active');
            document.getElementById('finalScore').innerText = `${correctAnswers} из ${quizData.length}`;
        }
    }

    // Инициализация
    loadQuestion();
</script>
